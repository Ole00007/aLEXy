<!doctype html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}aLEXy – Legal Intake &amp; Status Suite{% endblock %}</title>
    <script>
        (function () {
            try {
                var savedTheme = localStorage.getItem("alexy-theme") || "dark";
                document.documentElement.setAttribute("data-theme", savedTheme);
            } catch (error) {
                document.documentElement.setAttribute("data-theme", "dark");
            }
        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400..850&display=swap" rel="stylesheet">
    <style>
        :root {
            --font-display: 'Instrument Serif', Georgia, serif;
            --font-body: 'Inter', system-ui, -apple-system, sans-serif;
            --text-xs: clamp(0.7rem, 1vw, 0.75rem);
            --text-sm: clamp(0.8rem, 1.2vw, 0.875rem);
            --text-base: clamp(0.9rem, 1.5vw, 1rem);
            --text-lg: clamp(1rem, 2vw, 1.125rem);
            --text-xl: clamp(1.1rem, 2.5vw, 1.25rem);
            --text-2xl: clamp(1.3rem, 3vw, 1.6rem);
            --text-3xl: clamp(1.8rem, 4vw, 2.6rem);
            --text-hero: clamp(2.4rem, 6vw, 4rem);
            --space-1: 0.25rem;--space-2:0.5rem;--space-3:0.75rem;--space-4:1rem;
            --space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;--space-12:3rem;
            --space-16:4rem;--space-20:5rem;--space-24:6rem;
            --radius-sm:6px;--radius-md:10px;--radius-lg:16px;--radius-xl:24px;--radius-full:9999px;
            --transition:180ms cubic-bezier(0.16,1,0.3,1);
        }
        [data-theme="dark"] {
            --bg:#0E1117;--surface:#161B27;--surface-2:#1E2535;--border:#1E2A3A;
            --text:#E2E8F0;--text-muted:#94A3B8;--text-faint:#475569;
            --accent:#3B7DD8;--accent-h:#5A96F0;--accent-glow:rgba(59,125,216,0.2);
            --teal:#0F9B8E;--teal-h:#14B8A9;--success:#10B981;--warning:#F59E0B;
            --shadow-sm:0 1px 3px rgba(0,0,0,0.4);--shadow-md:0 4px 20px rgba(0,0,0,0.5);--shadow-lg:0 12px 40px rgba(0,0,0,0.6);
        }
        [data-theme="light"] {
            --bg:#F8FAFC;--surface:#FFFFFF;--surface-2:#F1F5F9;--border:#E2E8F0;
            --text:#0F172A;--text-muted:#475569;--text-faint:#94A3B8;
            --accent:#1D4ED8;--accent-h:#1E40AF;--accent-glow:rgba(29,78,216,0.12);
            --teal:#0D9488;--teal-h:#0F766E;--success:#059669;--warning:#D97706;
            --shadow-sm:0 1px 3px rgba(0,0,0,0.07);--shadow-md:0 4px 20px rgba(0,0,0,0.09);--shadow-lg:0 12px 40px rgba(0,0,0,0.12);
        }
        *,*::before,*::after{box-sizing:border-box}
        html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
        body{margin:0;min-height:100vh;font-family:var(--font-body);font-size:var(--text-base);line-height:1.65;color:var(--text);background:var(--bg)}
        a{color:var(--accent);font-weight:600;text-decoration:none}
        a:hover{color:var(--accent-h)}
        button,input,textarea,select,a{transition:color var(--transition),background var(--transition),border-color var(--transition),box-shadow var(--transition)}
        :focus-visible{outline:2px solid var(--accent);outline-offset:2px}
        .skip-link{position:absolute;left:var(--space-4);top:var(--space-4);z-index:100;padding:var(--space-2) var(--space-3);color:#fff;background:var(--accent);border-radius:var(--radius-sm);transform:translateY(-160%)}
        .skip-link:focus{transform:translateY(0)}
        .shell{display:grid;grid-template-columns:260px minmax(0,1fr);min-height:100vh}
        .sidebar{position:sticky;top:0;height:100vh;padding:var(--space-6);background:var(--surface);border-right:1px solid var(--border)}
        .brand{display:flex;align-items:center;gap:var(--space-3);margin-bottom:var(--space-8);color:var(--text);font-weight:700;letter-spacing:-0.02em}
        .brand-mark{width:36px;height:36px;background:var(--accent);border-radius:var(--radius-md);display:grid;place-items:center}
        .brand-mark svg{width:20px;height:20px;stroke:#fff}
        .brand-copy small{display:block;margin-top:0;color:var(--text-muted);font-size:var(--text-xs);font-weight:600;letter-spacing:0.05em;text-transform:uppercase}
        .nav-label{margin:var(--space-6) 0 var(--space-2);color:var(--text-muted);font-size:var(--text-xs);font-weight:700;letter-spacing:0.12em;text-transform:uppercase}
        .nav-list{display:grid;gap:var(--space-1);margin:0;padding:0;list-style:none}
        .nav-link{display:flex;align-items:center;justify-content:space-between;min-height:40px;padding:var(--space-2) var(--space-3);color:var(--text-muted);border:1px solid transparent;border-radius:var(--radius-md);font-size:var(--text-sm);font-weight:600}
        .nav-link:hover{color:var(--text);background:var(--surface-2)}
        .nav-dot{width:6px;height:6px;background:var(--success);border-radius:50%}
        .sidebar-card{margin-top:var(--space-8);padding:var(--space-4);background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-lg)}
        .sidebar-card p{margin:var(--space-2) 0 0;color:var(--text-muted);font-size:var(--text-sm)}
        .workspace{min-width:0}
        .topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:var(--space-4);min-height:64px;padding:var(--space-4) var(--space-8);background:color-mix(in srgb, var(--bg) 80%, transparent);border-bottom:1px solid var(--border);backdrop-filter:blur(16px)}
        .breadcrumb{color:var(--text-muted);font-size:var(--text-sm);font-weight:600}
        .topbar-actions{display:flex;align-items:center;gap:var(--space-3)}
        .theme-toggle{display:inline-flex;align-items:center;justify-content:center;min-width:36px;min-height:36px;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-full);cursor:pointer}
        .theme-toggle:hover{border-color:var(--accent)}
        .page{min-height:calc(100vh - 64px);padding:var(--space-8)}
        .card{width:min(1120px,100%);margin:0 auto;padding:var(--space-8);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-md)}
        .stack{display:grid;gap:var(--space-6)}
        .section{padding:var(--space-5);background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-lg)}
        .section+.section{margin-top:0}
        .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:var(--space-4)}
        .feature-grid{display:grid;grid-template-columns:1.2fr 1fr;gap:var(--space-4);margin:0}
        .feature{padding:var(--space-5);background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-lg)}
        .feature:first-child{grid-row:span 2;background:linear-gradient(135deg,var(--accent-glow),transparent 58%),var(--surface-2)}
        .feature p{margin-bottom:0}
        .eyebrow{margin:0 0 var(--space-3);color:var(--accent-h);font-family:var(--font-display);font-size:var(--text-xs);font-weight:400;font-style:italic;letter-spacing:0em;text-transform:none}
        h1{margin:0 0 var(--space-4);color:var(--text);font-family:var(--font-display);font-size:var(--text-3xl);font-weight:400;line-height:1.15;letter-spacing:-0.03em}
        h2{margin:0 0 var(--space-4);color:var(--text);font-family:var(--font-display);font-size:var(--text-2xl);font-weight:400;line-height:1.2;letter-spacing:-0.02em}
        h3{margin:0 0 var(--space-2);color:var(--text);font-size:var(--text-lg);font-weight:700;letter-spacing:-0.01em}
        p{margin:0 0 var(--space-4)}
        .intro{max-width:72ch;color:var(--text-muted);font-size:var(--text-base);line-height:1.7}
        .button{display:inline-flex;align-items:center;justify-content:center;min-height:44px;margin:0;padding:0 var(--space-4) 0 var(--space-4);color:#fff;background:var(--accent);border:1px solid var(--accent);border-radius:var(--radius-md);font-size:var(--text-sm);font-weight:600;text-decoration:none;cursor:pointer}
        .button:hover{background:var(--accent-h);border-color:var(--accent-h)}
        .button-secondary{color:var(--text);background:transparent;border:1px solid var(--border);box-shadow:none}
        .button-secondary:hover{color:var(--text);background:var(--surface-2);border-color:var(--text-muted)}
        label{display:inline-block;margin-bottom:var(--space-2);color:var(--text);font-size:var(--text-sm);font-weight:600}
        input,select,textarea{width:100%;min-height:44px;padding:var(--space-3);color:var(--text);background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-md);font:inherit}
        input[type="file"]{padding:var(--space-2);color:var(--text-muted)}
        input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
        textarea{resize:vertical}
        small{display:block;margin-top:var(--space-2);color:var(--text-muted);font-size:var(--text-xs)}
        table{width:100%;border-collapse:collapse;font-size:var(--text-sm)}
        th,td{padding:var(--space-3) var(--space-4);border-bottom:1px solid var(--border);text-align:left;vertical-align:top}
        tr:hover td{background:var(--accent-glow)}
        th{color:var(--text-muted);background:var(--surface-2);font-size:var(--text-xs);font-weight:700;letter-spacing:0.08em;text-transform:uppercase}
        .table-wrap{width:100%;overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius-lg)}
        .badge{display:inline-flex;align-items:center;gap:var(--space-2);padding:var(--space-1) var(--space-3);color:var(--success);background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.3);border-radius:var(--radius-full);font-size:var(--text-xs);font-weight:700;white-space:nowrap}
        .notice{padding:var(--space-4);color:var(--text-muted);background:var(--accent-glow);border:1px solid var(--accent);border-radius:var(--radius-md);font-size:var(--text-sm)}
        .notice p:last-child{margin-bottom:0}
        .actions{display:flex;flex-wrap:wrap;gap:var(--space-3);align-items:center}
        .meta-list{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:var(--space-3) var(--space-5)}
        .meta-list p{margin:0}
        .timeline{display:grid;gap:var(--space-3);margin:0;padding:0;list-style:none}
        .timeline li{padding:var(--space-4);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md)}
        .progress-list{display:grid;gap:var(--space-2);margin:0;padding-left:var(--space-6)}
        .progress-current{color:var(--success);font-weight:850}
        .status-display{display:grid;gap:var(--space-2);padding:var(--space-5);background:linear-gradient(135deg,rgba(16,185,129,0.12),transparent 60%),var(--surface);border:1px solid rgba(16,185,129,0.3);border-radius:var(--radius-lg)}
        .status-display strong{color:var(--success);font-size:var(--text-lg)}
        @media(max-width:900px){.shell{grid-template-columns:1fr}.sidebar{position:static;height:auto;padding:var(--space-4);border-right:0;border-bottom:1px solid var(--border)}.brand{margin-bottom:var(--space-4)}.nav-list{grid-template-columns:repeat(3,minmax(0,1fr))}.sidebar-card,.nav-label{display:none}.topbar{padding:var(--space-3) var(--space-4)}.page{padding:var(--space-4)}}
        @media(max-width:640px){.card{padding:var(--space-4);border-radius:var(--radius-lg)}.grid,.feature-grid,.meta-list{grid-template-columns:1fr}.feature:first-child{grid-row:auto}.nav-list{grid-template-columns:1fr}.breadcrumb{display:none}.topbar{justify-content:flex-end}th,td{padding:var(--space-3)}}
        @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;animation-iteration-count:1!important;scroll-behavior:auto!important;transition-duration:0.01ms!important}}
    </style>
</head>
<body>
    <a class="skip-link" href="#main-content">Skip to content</a>
    <div class="shell">
        <aside class="sidebar" aria-label="aLEXy workspace navigation">
            <a class="brand" href="{{ url_for('root') }}" aria-label="aLEXy home">
                <span class="brand-mark" aria-hidden="true">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                        <path d="M6 4h8.5L19 8.5V20H6V4Z" stroke="currentColor" stroke-width="1.8" />
                        <path d="M14 4v5h5" stroke="currentColor" stroke-width="1.8" />
                        <path d="M9 13h6M9 16h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                    </svg>
                </span>
                <span class="brand-copy">
                    aLEXy
                    <small>Legal Tech</small>
                </span>
            </a>
            <p class="nav-label">Workspace</p>
            <ul class="nav-list">
                <li><a class="nav-link" href="{{ url_for('root') }}">Dashboard</a></li>
                <li><a class="nav-link" href="{{ url_for('kanban.kanban') }}">Kanban <span class="nav-dot" aria-hidden="true"></span></a></li>
            </ul>
            <div class="sidebar-card">
                <h3>Trusted Legal Intelligence</h3>
                <p>Private intake, discreet document receipt, and clear client-facing status updates.</p>
            </div>
        </aside>
        <div class="workspace">
            <header class="topbar">
                <div class="breadcrumb">aLEXy / Confidential workflow suite</div>
                <div class="topbar-actions">
                    <button class="theme-toggle" type="button" data-theme-toggle aria-label="Switch to light mode">
                        <svg data-theme-icon width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </button>
                </div>
            </header>
            <main class="page" id="main-content">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
    <script>
        (function () {
            var root = document.documentElement;
            var toggle = document.querySelector("[data-theme-toggle]");
            var icon = document.querySelector("[data-theme-icon]");
            function render(theme) {
                root.setAttribute("data-theme", theme);
                if (!toggle || !icon) return;
                toggle.setAttribute("aria-label", "Switch to " + (theme === "dark" ? "light" : "dark") + " mode");
                icon.innerHTML = theme === "dark"
                    ? '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />'
                    : '<circle cx="12" cy="12" r="4.5" stroke="currentColor" stroke-width="2" /><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" stroke="currentColor" stroke-width="2" stroke-linecap="round" />';
            }
            function getTheme() {
                try { return localStorage.getItem("alexy-theme") || "dark"; }
                catch (error) { return "dark"; }
            }
            render(getTheme());
            if (toggle) {
                toggle.addEventListener("click", function () {
                    var next = root.getAttribute("data-theme") === "dark" ? "light" : "dark";
                    try { localStorage.setItem("alexy-theme", next); } catch (error) {}
                    render(next);
                });
            }
        })();
    </script>
</body>
</html>
